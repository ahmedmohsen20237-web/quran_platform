<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>

  <title>مدرسة القرآن الكريم | Quran Learning Platform</title>

  <!-- Fonts -->

<body>

     TOAST CONTAINER
     ═══════════════════════════════════════════════════════════════ -->
<div id="toast-container"></div>

<!-- ═══════════════════════════════════════════════════════════════
     GLOBAL MODALS (shared across all pages)
     ═══════════════════════════════════════════════════════════════ -->

<!-- Book Session Modal -->
<div id="modal-book" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="modal-book-title">
      📋 Book Session
      <span class="arabic-sub">حجز الجلسة</span>
    </div>
    <div id="modal-book-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-book')">Cancel</button>
      <button class="btn btn-primary" id="confirm-book-btn" onclick="confirmBooking()">Confirm Booking</button>
    </div>
  </div>
</div>

<!-- Upload Payment Modal -->
<div id="modal-upload" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">
      💳 Upload Payment Receipt
      <span class="arabic-sub">رفع إيصال الدفع</span>
    </div>
    <div id="modal-upload-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-upload')">Cancel</button>
      <button class="btn btn-primary" id="submit-payment-btn" onclick="submitPayment()">Submit Receipt</button>
    </div>
  </div>
</div>

<!-- Session Form Modal (Teacher) -->
<div id="modal-session" class="modal-overlay" style="display:none">
  <div class="modal-box" style="max-width:580px">
    <div class="modal-title" id="modal-session-title">
      ➕ Create New Session
    </div>
    <div id="modal-session-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-session')">Cancel</button>
      <button class="btn btn-primary" id="save-session-btn" onclick="saveSession()">Save Session</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     FIREBASE SDK v10 (Modular — ESM via CDN)
     ═══════════════════════════════════════════════════════════════ -->
<script type="module" src="script.js"></script>

<!-- ═══════════════════════════════════════════════════════════════
     FIRESTORE SECURITY RULES (copy to Firebase Console)
     ═══════════════════════════════════════════════════════════════
rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {

    // Users: readable by owner & admins, writable on create by anyone
    match /users/{userId} {
      allow read: if request.auth != null;
      allow create: if request.auth.uid == userId;
      allow update: if request.auth.uid == userId
        || get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin';
    }

    // Sessions: public read, teacher/admin write
    match /sessions/{sessionId} {
      allow read: if true;
      allow create: if request.auth != null
        && get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role in ['teacher','admin'];
      allow update: if request.auth != null
        && (resource.data.teacherId == request.auth.uid
            || get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin');
      allow delete: if get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin';
    }

    // Bookings: student creates their own, teacher/admin reads all
    match /bookings/{bookingId} {
      allow create: if request.auth != null
        && request.resource.data.studentId == request.auth.uid;
      allow read: if request.auth != null
        && (resource.data.studentId == request.auth.uid
            || resource.data.teacherId == request.auth.uid
            || get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin');
      allow update: if request.auth != null
        && (resource.data.studentId == request.auth.uid
            || get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin');
    }

    // Notifications: user reads their own
    match /notifications/{notifId} {
      allow read, update: if request.auth != null
        && (resource.data.userId == request.auth.uid
            || get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin');
      allow create: if request.auth != null;
    }

    // Audit logs: admin reads, anyone creates
    match /audit_logs/{logId} {
      allow create: if request.auth != null;
      allow read: if get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin';
    }
  }
}
     ════════════════════════════════════════════════════════════ -->

</body>
